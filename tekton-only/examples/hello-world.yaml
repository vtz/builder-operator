apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: hello-world-
  namespace: hello-demo
spec:
  pipelineRef:
    name: configurable-build-pipeline
  timeouts:
    pipeline: "10m"
  params:
    - name: containerImage
      value: "gcc:13"
    - name: fetchCommand
      value: >-
        mkdir -p fetched generated bin output &&
        cp /host-samples/hello-world-input.txt fetched/hello-world-input.txt
    - name: prebuildCommand
      value: >-
        cp fetched/hello-world-input.txt generated/hello-world.cpp
    - name: buildCommand
      value: >-
        g++ generated/hello-world.cpp -o bin/hello-world
    - name: postbuildCommand
      value: >-
        ./bin/hello-world && test -f output/output.txt
    - name: deployCommand
      value: >-
        mkdir -p /host-build/deployment/generated /host-build/deployment/bin /host-build/deployment/output &&
        cp generated/hello-world.cpp /host-build/deployment/generated/ &&
        cp bin/hello-world /host-build/deployment/bin/ &&
        cp output/output.txt /host-build/deployment/output/
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
