apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: caches.builder.sdv.cloud.redhat.com
spec:
  group: builder.sdv.cloud.redhat.com
  names:
    kind: Cache
    listKind: CacheList
    plural: caches
    singular: cache
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Size
          type: string
          jsonPath: .spec.storageSize
        - name: Shared
          type: boolean
          jsonPath: .spec.shared
        - name: PVC
          type: string
          jsonPath: .status.pvcName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [ccache, west, pip, go, generic]
                storageSize:
                  type: string
                  default: "5Gi"
                storageClassName:
                  type: string
                maxAge:
                  type: string
                shared:
                  type: boolean
                  default: true
            status:
              type: object
              properties:
                pvcName:
                  type: string
                phase:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string }
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason: { type: string }
                      message: { type: string }
                      observedGeneration:
                        type: integer
                        format: int64
      subresources:
        status: {}
