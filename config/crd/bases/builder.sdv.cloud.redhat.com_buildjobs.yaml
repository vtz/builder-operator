apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: buildjobs.builder.sdv.cloud.redhat.com
spec:
  group: builder.sdv.cloud.redhat.com
  names:
    kind: BuildJob
    listKind: BuildJobList
    plural: buildjobs
    singular: buildjob
    shortNames:
      - bj
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Board
          type: string
          jsonPath: .spec.target.board
        - name: Platform
          type: string
          jsonPath: .spec.target.platform
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - source
                - stages
              properties:
                toolchain:
                  type: object
                  properties:
                    image:
                      type: string
                      default: "ubuntu:24.04"
                    serviceAccountName:
                      type: string
                source:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum: [git, pvc]
                    git:
                      type: object
                      required: [url]
                      properties:
                        url:
                          type: string
                        revision:
                          type: string
                          default: main
                        credentialsSecretRef:
                          type: object
                          required: [name]
                          properties:
                            name: { type: string }
                            key: { type: string }
                    pvc:
                      type: object
                      required: [claimName]
                      properties:
                        claimName: { type: string }
                        path:
                          type: string
                          default: /
                target:
                  type: object
                  properties:
                    board:
                      type: string
                    platform:
                      type: string
                      enum: [zephyr, openbsw, cmake, posix, custom]
                    architecture:
                      type: string
                      enum: [arm, riscv, xtensa, x86, native]
                    variant:
                      type: string
                stages:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, command]
                    properties:
                      name:
                        type: string
                        minLength: 1
                      command:
                        type: string
                        minLength: 1
                      image:
                        type: string
                artifacts:
                  type: object
                  properties:
                    destination:
                      type: string
                      enum: [pvc, oci]
                      default: pvc
                    path:
                      type: string
                caches:
                  type: array
                  items:
                    type: object
                    required: [name, mountPath]
                    properties:
                      name: { type: string }
                      mountPath: { type: string }
                timeout:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Succeeded, Failed]
                currentPipelineRun:
                  type: string
                artifactURI:
                  type: string
                failureReason:
                  type: string
                commitSHA:
                  type: string
                runCount:
                  type: integer
                  format: int64
                lastRunAt:
                  type: string
                stages:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      state: { type: string }
                      message: { type: string }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string }
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason: { type: string }
                      message: { type: string }
                      observedGeneration:
                        type: integer
                        format: int64
      subresources:
        status: {}
