apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: buildconfigs.builder.sdv.cloud.redhat.com
spec:
  group: builder.sdv.cloud.redhat.com
  names:
    kind: BuildConfig
    listKind: BuildConfigList
    plural: buildconfigs
    singular: buildconfig
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                defaults:
                  type: object
                  properties:
                    timeout:
                      type: string
                      default: "30m"
                    toolchainImage:
                      type: string
                      default: "ubuntu:24.04"
                    cacheStorageClass:
                      type: string
                compliance:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    sbomFormat:
                      type: string
                      enum: [spdx-json, cyclonedx-json]
                    signingEnabled:
                      type: boolean
                buildApi:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    routeEnabled:
                      type: boolean
                      default: true
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string }
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason: { type: string }
                      message: { type: string }
                      observedGeneration:
                        type: integer
                        format: int64
      subresources:
        status: {}
