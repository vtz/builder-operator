apiVersion: builder.sdv.cloud.redhat.com/v1alpha1
kind: BuildJob
metadata:
  name: openbsw-posix-freertos
  namespace: bob-builds
spec:
  toolchain:
    # Built by Toolchain CR "openbsw-toolchain" — has cmake, ninja, g++, python3 pre-installed.
    image: image-registry.openshift-image-registry.svc:5000/bob-builds/openbsw-toolchain:latest
  source:
    type: git
    git:
      url: https://github.com/eclipse-openbsw/openbsw.git
      revision: main
  target:
    platform: openbsw
    architecture: x86
  stages:
    - name: configure
      command: "cd source && cmake --preset posix-freertos"
    - name: build
      command: "cd source && cmake --build --preset posix-freertos"
    - name: package
      command: >-
        mkdir -p /workspace/artifacts &&
        cp source/build/posix-freertos/executables/referenceApp/application/Release/app.referenceApp.elf
        /workspace/artifacts/ 2>/dev/null || true
  artifacts:
    destination: pvc
    path: /workspace/artifacts
  timeout: 60m
