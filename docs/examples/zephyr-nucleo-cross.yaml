apiVersion: builder.sdv.cloud.redhat.com/v1alpha1
kind: BuildJob
metadata:
  name: body-ecu-nucleo
  namespace: bob-builds
spec:
  toolchain:
    image: image-registry.openshift-image-registry.svc:5000/bob-builds/body-ecu:latest
  source:
    type: git
    git:
      url: https://github.com/vtz/body-ecu
      revision: feature/openbsw-integration
  target:
    board: nucleo_h755zi_q/stm32h755xx/m7
    platform: zephyr
    architecture: arm
  stages:
    - name: fetch
      command: >-
        if [ -d /root/.west-modules/.west ]; then
          echo "Restoring cached west modules..." &&
          cp -a /root/.west-modules/.west . 2>/dev/null || true &&
          cp -a /root/.west-modules/modules . 2>/dev/null || true &&
          cp -a /root/.west-modules/bootloader . 2>/dev/null || true &&
          cp -a /root/.west-modules/tools . 2>/dev/null || true;
        fi &&
        west init -l source 2>/dev/null || true &&
        west update &&
        echo "Saving modules to cache..." &&
        cp -a .west /root/.west-modules/ &&
        for d in modules bootloader tools; do
          [ -d "$d" ] && cp -a "$d" /root/.west-modules/;
        done
    - name: build
      command: "west build -b ${BOB_BOARD} source/app"
    - name: package
      command: >-
        mkdir -p /workspace/artifacts &&
        cp build/zephyr/zephyr.bin /workspace/artifacts/ &&
        cp build/zephyr/zephyr.hex /workspace/artifacts/ &&
        cp build/zephyr/zephyr.elf /workspace/artifacts/
  artifacts:
    destination: pvc
    path: /workspace/artifacts
  caches:
    - name: ccache
      mountPath: /root/.ccache
    - name: west-modules
      mountPath: /root/.west-modules
