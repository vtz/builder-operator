apiVersion: builder.sdv.cloud.redhat.com/v1alpha1
kind: BuildJob
metadata:
  name: body-ecu-nucleo
  namespace: bob-builds
spec:
  toolchain:
    image: ghcr.io/zephyrproject-rtos/ci-base:v0.27.4
  source:
    type: git
    git:
      url: https://github.com/vtz/body-ecu
      revision: main
  target:
    board: nucleo_h755zi_q
    platform: zephyr
    architecture: arm
  stages:
    - name: fetch
      command: "west init -l src && west update"
    - name: build
      command: "west build -b ${BOB_BOARD} src/app"
    - name: package
      command: >-
        mkdir -p /workspace/artifacts &&
        cp build/zephyr/zephyr.bin /workspace/artifacts/ &&
        cp build/zephyr/zephyr.hex /workspace/artifacts/ &&
        cp build/zephyr/zephyr.elf /workspace/artifacts/
  artifacts:
    destination: pvc
    path: /workspace/artifacts
  caches:
    - name: ccache
      mountPath: /root/.ccache
    - name: west-modules
      mountPath: /root/.west-modules
