apiVersion: builder.sdv.cloud.redhat.com/v1alpha1
kind: BuildJob
metadata:
  name: body-ecu-nucleo
  namespace: bob-builds
spec:
  toolchain:
    image: image-registry.openshift-image-registry.svc:5000/bob-builds/body-ecu:latest
  source:
    type: git
    git:
      url: https://github.com/vtz/body-ecu
      revision: feature/openbsw-integration
  target:
    board: nucleo_h755zi_q/stm32h755xx/m7
    platform: zephyr
    architecture: arm
  stages:
    - name: fetch
      command: "west init -l source && west update"
    - name: build
      command: "west build -b ${BOB_BOARD} source/app"
    - name: package
      command: >-
        mkdir -p /workspace/artifacts &&
        cp build/zephyr/zephyr.bin /workspace/artifacts/ &&
        cp build/zephyr/zephyr.hex /workspace/artifacts/ &&
        cp build/zephyr/zephyr.elf /workspace/artifacts/
  artifacts:
    destination: pvc
    path: /workspace/artifacts
  caches:
    - name: ccache
      mountPath: /root/.ccache
    - name: west-modules
      mountPath: /root/.west-modules
