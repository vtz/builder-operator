apiVersion: builder.sdv.cloud.redhat.com/v1alpha1
kind: BuildJob
metadata:
  name: git-fetch-example
  namespace: bob-builds
spec:
  toolchain:
    image: ubuntu:24.04
  source:
    type: git
    git:
      url: https://github.com/example/repo.git
      revision: main
      credentialsSecretRef:
        name: github-creds
  stages:
    - name: fetch
      command: "apt-get update && apt-get install -y git && git clone https://github.com/example/repo.git /workspace/src"
    - name: build
      command: "apt-get update && apt-get install -y g++ && g++ /workspace/src/main.cpp -o /workspace/bin/app"
    - name: test
      command: "/workspace/bin/app"
  artifacts:
    destination: pvc
    path: /workspace/bin
