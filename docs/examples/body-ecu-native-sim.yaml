apiVersion: builder.sdv.cloud.redhat.com/v1alpha1
kind: BuildJob
metadata:
  name: body-ecu-native-sim
  namespace: bob-builds
spec:
  toolchain:
    image: image-registry.openshift-image-registry.svc:5000/bob-builds/body-ecu:latest
  source:
    type: git
    git:
      url: https://github.com/vtz/body-ecu
      revision: main
  target:
    board: native_sim/native/64
    platform: zephyr
    architecture: native
  stages:
    - name: fetch
      command: "west init -l source && west update"
    - name: build
      command: "west build -b ${BOB_BOARD} source/app"
    - name: package
      command: >-
        mkdir -p /workspace/artifacts/firmware /workspace/artifacts/renode &&
        cp build/artifacts/firmware/* /workspace/artifacts/firmware/ &&
        cp build/artifacts/renode/* /workspace/artifacts/renode/
  artifacts:
    destination: pvc
    path: /workspace/artifacts
  caches:
    - name: ccache
      mountPath: /root/.ccache
    - name: west-modules
      mountPath: /root/.west-modules
