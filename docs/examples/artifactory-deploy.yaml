apiVersion: builder.sdv.cloud.redhat.com/v1alpha1
kind: BuildJob
metadata:
  name: artifactory-deploy-example
  namespace: bob-builds
spec:
  toolchain:
    image: ubuntu:24.04
  source:
    type: git
    git:
      url: https://github.com/example/firmware.git
      revision: release/v1.0
  target:
    board: custom-board
    platform: cmake
    architecture: arm
  stages:
    - name: fetch
      command: "git clone --depth 1 https://github.com/example/firmware.git /workspace/src"
    - name: build
      command: "cd /workspace/src && cmake -B build && cmake --build build"
    - name: package
      command: "cp /workspace/src/build/firmware.bin /workspace/artifacts/"
  artifacts:
    destination: oci
    path: /workspace/artifacts
