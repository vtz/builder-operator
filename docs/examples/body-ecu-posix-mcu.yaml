apiVersion: builder.sdv.cloud.redhat.com/v1alpha1
kind: BuildJob
metadata:
  name: body-ecu-posix-mcu
  namespace: bob-builds
spec:
  toolchain:
    image: image-registry.openshift-image-registry.svc:5000/bob-builds/body-ecu:latest
  source:
    type: git
    git:
      url: https://github.com/vtz/body-ecu
      revision: main
  target:
    platform: posix
    architecture: native
  stages:
    - name: fetch
      command: "west init -l source && west update --narrow -o=--depth=1"
    - name: build
      command: "cmake -S source/platforms/posix-mcu -B build && cmake --build build -j$(nproc)"
    - name: package
      command: >-
        mkdir -p /workspace/artifacts &&
        cp build/body_ecu_posix_mcu /workspace/artifacts/
  artifacts:
    destination: pvc
    path: /workspace/artifacts
  caches:
    - name: ccache
      mountPath: /root/.ccache
    - name: west-modules
      mountPath: /root/.west-modules
